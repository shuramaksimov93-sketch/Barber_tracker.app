<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Barber Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f0f5;--bg2:#e4e4ec;--card:#fff;
  --t1:#18181b;--t2:#52525b;--t3:#a1a1aa;
  --blue:#2563eb;--bl:rgba(37,99,235,.1);--bm:rgba(37,99,235,.18);
  --green:#16a34a;--gl:rgba(22,163,74,.1);
  --red:#dc2626;--rl:rgba(220,38,38,.09);
  --orange:#ea580c;--ol:rgba(234,88,12,.1);
  --purple:#7c3aed;--pl:rgba(124,58,237,.1);
  --sep:rgba(0,0,0,.07);--sep2:rgba(0,0,0,.04);
  --r-xl:22px;--r-lg:16px;
  --sh-s:0 1px 4px rgba(0,0,0,.07);
  --sh:0 4px 18px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  --sh-xl:0 24px 60px rgba(0,0,0,.18),0 8px 24px rgba(0,0,0,.1);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f0f12;--bg2:#1c1c22;--card:#1e1e26;
  --t1:#f4f4f5;--t2:#a1a1aa;--t3:#52525b;
  --sep:rgba(255,255,255,.08);--sep2:rgba(255,255,255,.04);
  --sh-s:0 1px 4px rgba(0,0,0,.4);--sh:0 4px 18px rgba(0,0,0,.5),0 1px 4px rgba(0,0,0,.3);
  --sh-xl:0 24px 60px rgba(0,0,0,.7),0 8px 24px rgba(0,0,0,.4);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',-apple-system,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
body.sheet-open,body.modal-open{overflow:hidden;position:fixed;width:100%;height:100%;}
input,textarea,button,select{font-family:inherit;color:var(--t1)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input,textarea{background:transparent;color:var(--t1);-webkit-text-fill-color:var(--t1)}
input::placeholder,textarea::placeholder{color:var(--t3);-webkit-text-fill-color:var(--t3)}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.au{animation:fadeUp .32s cubic-bezier(.34,1.2,.64,1) both}
.au2{animation:fadeUp .32s .06s cubic-bezier(.34,1.2,.64,1) both}
.au3{animation:fadeUp .32s .12s cubic-bezier(.34,1.2,.64,1) both}

/* NAV */
.nav{position:sticky;top:0;z-index:90;padding:12px 16px 10px;background:rgba(240,240,245,.88);backdrop-filter:saturate(180%) blur(24px);border-bottom:1px solid var(–sep)}
@media(prefers-color-scheme:dark){.nav{background:rgba(15,15,18,.9)}}
.nav-inner{max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:8px}
.nav-logo{font-size:17px;font-weight:900;letter-spacing:-.6px;white-space:nowrap;cursor:pointer;flex-shrink:0}
.nav-logo em{font-style:normal;color:var(–blue)}
.lang-btn{border:none;background:none;cursor:pointer;font-size:16px;padding:4px;flex-shrink:0}

.main{max-width:700px;margin:0 auto;padding:18px 14px 110px}
.slabel{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(–t3);padding:0 4px;margin-bottom:7px;margin-top:22px}
.slabel:first-child{margin-top:0}
.card{background:var(–card);border-radius:var(–r-xl);box-shadow:var(–sh);overflow:hidden}

/* LOC GRID */
.loc-grid{display:flex;flex-wrap:wrap;gap:7px}
.loc-pill{flex:1;min-width:72px;background:var(–card);border-radius:var(–r-lg);box-shadow:var(–sh-s);border:1.5px solid transparent;padding:12px 6px 10px;text-align:center;cursor:pointer;transition:all .22s cubic-bezier(.34,1.2,.64,1);position:relative}
.loc-pill:hover{transform:translateY(-1px);box-shadow:var(–sh)}
.loc-pill.active{transform:translateY(-1px);box-shadow:var(–sh)}
.lp-icon{font-size:17px;line-height:1;margin-bottom:3px}
.lp-name{font-size:9.5px;font-weight:700;color:var(–t2);line-height:1.2}
.reform-badge{position:absolute;top:3px;right:3px;font-size:7px;font-weight:800;background:var(–purple);color:white;border-radius:4px;padding:1px 3px}

/* DATE FIELD */
.date-field{display:flex;align-items:center;justify-content:space-between;padding:14px 17px;cursor:pointer;transition:background .15s;border-radius:var(–r-xl)}
.date-field:hover{background:var(–sep2)}
.df-l{display:flex;align-items:center;gap:9px}
.df-icon{width:30px;height:30px;border-radius:8px;background:var(–bl);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.df-lbl{font-size:15px;font-weight:600}
.df-r{display:flex;align-items:center;gap:5px}
.df-val{font-size:14px;font-weight:700;color:var(–blue)}
.df-dot{width:7px;height:7px;border-radius:50%;display:none}
.df-dot.on{display:block}
.df-chev{color:var(–t3);font-size:11px;transition:transform .22s}
.date-field.open .df-chev{transform:rotate(180deg)}
.cal-drop{max-height:0;overflow:hidden;opacity:0;transition:max-height .38s cubic-bezier(.4,0,.2,1),opacity .25s ease;border-top:1px solid transparent}
.cal-drop.open{max-height:420px;opacity:1;border-top-color:var(–sep)}
.cal-inner{padding:11px 11px 13px}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.cal-nav{width:31px;height:31px;border-radius:50%;border:none;background:var(–bg2);color:var(–t1);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav:hover{background:var(–bl);color:var(–blue)}
.cal-nav:active{transform:scale(.9)}
.cal-ml{font-size:14px;font-weight:700}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.cal-dw{font-size:10px;font-weight:700;color:var(–t3);text-align:center;padding:3px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cd{aspect-ratio:1;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:500;position:relative;border:none;background:none;color:var(–t1);transition:all .18s cubic-bezier(.34,1.2,.64,1)}
.cd:hover:not(.cdo){background:var(–bg2);transform:scale(1.08)}
.cdo{color:var(–t3);cursor:default}
.cd-today{font-weight:800;color:var(–blue)}
.cd-today::before{content:’’;position:absolute;inset:2px;border-radius:50%;border:1.5px solid var(–blue);opacity:.3}
.cd-sel{background:var(–blue)!important;color:white!important;font-weight:800;transform:scale(1.1);box-shadow:0 3px 14px rgba(37,99,235,.4)}
.cd-sel::before{display:none}
/* Calendar colored dots */
.cd-dot2{display:none;width:5px;height:5px;border-radius:50%;position:absolute;bottom:2px;left:50%;transform:translateX(-50%)}
.cd-has .cd-dot2{display:block}
/* Multi-loc: two mini dots */
.cd-dot2-multi{display:none;position:absolute;bottom:2px;left:50%;transform:translateX(-50%);gap:2px;flex-direction:row}
.cd-has-multi .cd-dot2-multi{display:flex}
.cd-sel .cd-dot2,.cd-sel .cd-dot2-multi{opacity:.8}

/* FORM */
.form-group{border-radius:var(–r-xl);overflow:hidden;box-shadow:var(–sh)}
.frow{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(–card);border-bottom:1px solid var(–sep);transition:background .15s;cursor:pointer;-webkit-user-select:none;user-select:none}
.frow:last-child{border-bottom:none}
.frow:active{background:var(–sep2)}
.frow-l{display:flex;align-items:center;gap:9px;flex:1;pointer-events:none}
.fi{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.frow-lbl{font-size:15px;font-weight:500}
.frow-r{display:flex;align-items:center;gap:4px;pointer-events:none}
.fval{font-size:15px;font-weight:700;color:var(–blue);min-width:50px;text-align:right}
.fval.empty{color:var(–t3);font-weight:400}
.funit{font-size:12px;color:var(–t3);font-weight:600}
.frow-note{align-items:flex-start;padding-top:13px;padding-bottom:13px;cursor:default}
.fnote-input{border:none;outline:none;background:none;font-size:14px;font-weight:400;color:var(–t1);-webkit-text-fill-color:var(–t1);width:175px;resize:none;height:38px;line-height:1.4;text-align:right;cursor:text;pointer-events:all}
.fnote-input::placeholder{color:var(–t3);-webkit-text-fill-color:var(–t3)}

/* EDIT BANNER */
.eb{border-radius:var(–r-lg);padding:11px 14px;background:linear-gradient(135deg,rgba(234,88,12,.13),rgba(234,88,12,.06));border:1.5px solid rgba(234,88,12,.25);display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;animation:scaleIn .25s cubic-bezier(.34,1.2,.64,1)}
.eb-l{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:var(–orange)}
.eb-btns{display:flex;gap:5px}
.eb-btn{font-size:12px;font-weight:700;border:none;border-radius:8px;padding:5px 11px;cursor:pointer;font-family:inherit;transition:all .15s}
.eb-reset{background:var(–rl);color:var(–red)}
.eb-cancel{background:var(–sep);color:var(–t2)}

/* PREVIEW */
.prev-strip{background:var(–card);border-radius:var(–r-xl);box-shadow:var(–sh);padding:14px 17px;display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;align-items:center}
.pv-sep{height:28px;background:var(–sep)}
.pv-item{text-align:center}
.pv-val{font-size:17px;font-weight:800;letter-spacing:-.5px}
.pv-lbl{font-size:10px;color:var(–t3);margin-top:1px;font-weight:600}
.pv-val.cb{color:var(–blue)}.pv-val.cg{color:var(–green)}.pv-val.cp{color:var(–purple)}

.save-btn{width:100%;padding:15px;border:none;border-radius:var(–r-xl);background:var(–blue);color:white;font-size:15px;font-weight:800;cursor:pointer;transition:all .22s cubic-bezier(.34,1.2,.64,1);box-shadow:0 4px 20px rgba(37,99,235,.32)}
.save-btn:hover{transform:translateY(-1px)}
.save-btn:active{transform:scale(.98)}
.save-btn.emode{background:var(–orange);box-shadow:0 4px 20px rgba(234,88,12,.3)}

/* PERIOD TABS */
.ptabs{display:flex;background:var(–card);border-radius:var(–r-lg);box-shadow:var(–sh-s);padding:3px;gap:2px;margin-bottom:13px}
.ptab{flex:1;padding:7px;border-radius:12px;text-align:center;font-family:inherit;font-size:12.5px;font-weight:600;color:var(–t2);border:none;background:none;cursor:pointer;transition:all .2s}
.ptab.active{background:var(–blue);color:white;box-shadow:0 2px 10px rgba(37,99,235,.32)}

/* MONTH NAV */
.mnav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.mnav-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(–bg2);color:var(–t1);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mnav-btn:hover{background:var(–bl);color:var(–blue)}
.mnav-btn:active{transform:scale(.9)}
.mnav-title{font-size:15px;font-weight:800;letter-spacing:-.3px;background:none;border:none;cursor:pointer;color:var(–t1);display:flex;align-items:center;gap:4px;font-family:inherit}
.mnav-title::after{content:‘▾’;font-size:10px;color:var(–blue);opacity:.7}

/* STAT CARDS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sc{background:var(–card);border-radius:var(–r-xl);box-shadow:var(–sh);padding:15px;transition:transform .2s}
.sc:hover{transform:translateY(-1px)}
.sc.full{grid-column:1/-1}
.sc.hero{background:linear-gradient(135deg,#1d4ed8,#2563eb,#3b82f6)}
.sc.hero-p{background:linear-gradient(135deg,#5b21b6,#7c3aed,#8b5cf6)}
.sc.hero .sc-lbl,.sc.hero-p .sc-lbl{color:rgba(255,255,255,.75)}
.sc-val{font-size:21px;font-weight:800;letter-spacing:-1px;color:var(–t1)}
.sc-val.cb{color:var(–blue)}.sc-val.cg{color:var(–green)}.sc-val.cp{color:var(–purple)}
.sc.hero .sc-val,.sc.hero-p .sc-val{color:white}
.sc-lbl{font-size:11px;color:var(–t2);margin-top:2px;font-weight:600}

/* REFORM SECTION */
.reform-sec{background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(124,58,237,.05));border:1.5px solid rgba(124,58,237,.2);border-radius:var(–r-xl);padding:15px 17px;margin-bottom:11px}
.reform-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.reform-title{font-size:14px;font-weight:800;color:var(–purple);display:flex;align-items:center;gap:7px}
.reform-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.rst{text-align:center;background:rgba(124,58,237,.07);border-radius:11px;padding:9px 5px}
.rst-val{font-size:14px;font-weight:800;color:var(–purple);letter-spacing:-.5px}
.rst-lbl{font-size:9.5px;color:var(–t3);margin-top:1px;font-weight:600}

/* LOC ROWS */
.loc-rows{overflow:hidden}
.loc-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(–sep);transition:background .15s}
.loc-row:last-child{border-bottom:none}
.loc-row:hover{background:var(–sep2)}
.lr-l{display:flex;align-items:center;gap:8px}
.lr-badge{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.lr-name{font-size:14px;font-weight:700}
.lr-sub{font-size:11px;color:var(–t2);margin-top:1px}
.lr-amt{font-size:14px;font-weight:800}

/* ENTRIES TABLE */
.etbl-hdr{display:grid;grid-template-columns:54px 1fr 76px 76px 50px;padding:7px 16px;border-bottom:1px solid var(–sep);gap:4px}
.etbl-hdr span{font-size:9.5px;font-weight:800;color:var(–t3);text-transform:uppercase;letter-spacing:.5px}
.erow{display:grid;grid-template-columns:54px 1fr 76px 76px 50px;padding:10px 16px;border-bottom:1px solid var(–sep);gap:4px;align-items:center;cursor:pointer;transition:background .15s}
.erow:last-child{border-bottom:none}
.erow:hover{background:rgba(37,99,235,.03)}
.er-date{font-size:12px;color:var(–t2);font-weight:700}
.er-loc{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700}
.er-num{font-size:12px;font-weight:700;text-align:right}
.er-num.g{color:var(–green)}.er-num.p{color:var(–purple)}
.er-cl{font-size:11px;color:var(–t2);text-align:right}

/* YEAR BARS */
.ybars{padding:12px 16px 14px}
.ybar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ybar-lbl{font-size:11px;font-weight:700;color:var(–t2);width:26px;flex-shrink:0}
.ybar-track{flex:1;height:25px;background:var(–bg2);border-radius:8px;overflow:hidden}
.ybar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#2563eb,#60a5fa);display:flex;align-items:center;justify-content:flex-end;padding-right:7px;transition:width .7s cubic-bezier(.34,1.1,.64,1)}
.ybar-fill span{font-size:10px;font-weight:800;color:white;white-space:nowrap}
.ybar.top .ybar-fill{background:linear-gradient(90deg,#16a34a,#4ade80)}
.ybar-empty{font-size:10.5px;color:var(–t3);line-height:25px;padding-left:6px}

/* INVOICE */
.inv-wrap{background:var(–card);border-radius:var(–r-xl);box-shadow:var(–sh);overflow:hidden}
.inv-head{padding:18px 20px 14px}
.inv-title{font-size:21px;font-weight:900;letter-spacing:-.6px}
.inv-sub{font-size:12.5px;color:var(–t2);margin-top:3px}
.inv-sh{padding:7px 20px 5px;background:var(–bg2);display:flex;align-items:center;gap:6px}
.inv-sh-icon{font-size:12px}
.inv-sh-name{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(–t2)}
.inv-line{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-bottom:1px solid var(–sep)}
.inv-line:last-child{border-bottom:none}
.inv-ll{font-size:13.5px;color:var(–t2);font-weight:500}
.inv-lr{font-size:13.5px;font-weight:800}
.inv-lr.cb{color:var(–blue)}.inv-lr.cp{color:var(–purple)}
.inv-total{padding:16px 20px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-top:1px solid rgba(22,163,74,.15)}
@media(prefers-color-scheme:dark){.inv-total{background:linear-gradient(135deg,rgba(22,163,74,.15),rgba(22,163,74,.08))}}
.inv-total-row{display:flex;justify-content:space-between;align-items:baseline}
.inv-total-lbl{font-size:11px;font-weight:800;color:var(–green);text-transform:uppercase;letter-spacing:.5px}
.inv-total-amt{font-size:28px;font-weight:900;letter-spacing:-1.5px;color:var(–green)}
.inv-reform-block{padding:13px 20px;background:rgba(124,58,237,.07);border-top:1px solid rgba(124,58,237,.15)}
.inv-reform-row{display:flex;justify-content:space-between;align-items:baseline}
.inv-reform-lbl{font-size:11px;font-weight:800;color:var(–purple);text-transform:uppercase;letter-spacing:.5px}
.inv-reform-amt{font-size:20px;font-weight:900;letter-spacing:-1px;color:var(–purple)}
.inv-notes{padding:13px 20px;border-top:1px solid var(–sep)}
.inv-notes-title{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(–t3);margin-bottom:8px}
.inv-note-g{margin-bottom:9px}
.inv-note-loc{font-size:10px;font-weight:800;color:var(–t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.inv-note-item{font-size:12.5px;line-height:1.55;padding:2px 0 2px 10px;border-left:2px solid var(–sep)}
.inv-note-d{color:var(–t2);font-weight:700}

/* MONTH PICKER */
.picker-ov{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.picker-ov.open{opacity:1;pointer-events:all}
.picker-box{background:var(–card);border-radius:26px;padding:19px;width:310px;box-shadow:var(–sh-xl);transform:scale(.94) translateY(10px);transition:transform .28s cubic-bezier(.34,1.2,.64,1)}
.picker-ov.open .picker-box{transform:scale(1) translateY(0)}
.py-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.py-nav{width:32px;height:32px;border-radius:50%;border:none;background:var(–bg2);color:var(–t1);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.py-nav:hover{background:var(–bl);color:var(–blue)}
.py-lbl{font-size:17px;font-weight:900}
.pm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.pm{padding:10px 4px;border-radius:12px;text-align:center;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s cubic-bezier(.34,1.2,.64,1);border:none;background:var(–bg2);color:var(–t1);position:relative}
.pm:hover{background:var(–bl);color:var(–blue);transform:translateY(-1px)}
.pm.active{background:var(–blue);color:white;box-shadow:0 3px 14px rgba(37,99,235,.38)}
.pm.hd::after{content:’’;position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(–green)}
.pm.active::after{background:rgba(255,255,255,.7)}
.picker-close{display:block;width:100%;margin-top:11px;padding:11px;border:none;border-radius:12px;background:var(–bg2);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:var(–t2);transition:all .15s}

/* BOTTOM SHEET */
.sheet-ov{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center}
.sheet-ov.open{opacity:1;pointer-events:all}
.sheet-box{background:var(–card);border-radius:26px 26px 0 0;width:100%;max-width:480px;padding-bottom:max(env(safe-area-inset-bottom),16px);transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.72,0,1);box-shadow:var(–sh-xl)}
.sheet-ov.open .sheet-box{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(–sep);margin:10px auto 0;cursor:grab}
.sheet-title{text-align:center;font-size:12px;font-weight:700;color:var(–t2);padding:8px 0 2px;text-transform:uppercase;letter-spacing:.6px}

/* ═══════════════════════════════════════
CALCULATOR — Liquid Glass
═══════════════════════════════════════ */

/* Sheet becomes glass container */
.sheet-box{
background:rgba(10,10,16,.82) !important;
backdrop-filter:saturate(180%) blur(40px) !important;
-webkit-backdrop-filter:saturate(180%) blur(40px) !important;
border:1px solid rgba(255,255,255,.07);
border-bottom:none;
box-shadow:0 -8px 60px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.1) !important;
}
.sheet-handle{background:rgba(255,255,255,.18) !important;}
.sheet-title{color:rgba(255,255,255,.45) !important;letter-spacing:.8px;}

/* Display area — deep glass */
.calc-wrap{
padding:0 0 4px;
background:transparent;
border-radius:0 0 26px 26px;
}
.calc-display{
padding:14px 22px 16px;
text-align:right;
min-height:120px;
display:flex;flex-direction:column;justify-content:flex-end;gap:4px;
background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,.18) 100%);
border-bottom:1px solid rgba(255,255,255,.05);
position:relative;
}
/* Subtle top-left light refraction on display */
.calc-display::before{
content:’’;position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
}
.calc-history{font-size:13px;font-weight:400;color:rgba(255,255,255,.28);min-height:18px;overflow-x:auto;overflow-y:hidden;white-space:nowrap;scrollbar-width:none;direction:rtl;text-align:left;padding-bottom:2px;}
.calc-history::-webkit-scrollbar{display:none}
.calc-expr-line{font-size:15px;font-weight:500;color:rgba(255,255,255,.45);min-height:20px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;}
.calc-main-num{
font-size:62px;font-weight:200;letter-spacing:-3px;
color:#fff;line-height:1;
overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
text-shadow:0 0 40px rgba(255,255,255,.15);
}

/* Pad backgrounds — transparent so glass shows through */
.calc-pad{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:1fr;gap:10px;padding:12px 14px 8px;background:transparent;}
.calc-pad-bottom{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;padding:0 14px 16px;background:transparent;}

/* ── LIQUID GLASS BUTTONS ── */
.ck{
border:none;cursor:pointer;font-family:inherit;
border-radius:50%;aspect-ratio:1;
display:flex;align-items:center;justify-content:center;
font-size:26px;font-weight:400;
width:100%;line-height:1;
-webkit-user-select:none;user-select:none;
position:relative;overflow:hidden;
/* Liquid glass base */
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
transition:transform .12s cubic-bezier(.34,1.3,.64,1),box-shadow .12s,filter .08s;
}
/* Inner light refraction pseudo-element */
.ck::before{
content:’’;
position:absolute;top:0;left:0;right:0;height:50%;
background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,rgba(255,255,255,0) 100%);
border-radius:50% 50% 0 0;
pointer-events:none;
}
.ck:active{transform:scale(.88);filter:brightness(1.2);}

/* Function buttons — frosted gray glass */
.ck-func{
background:rgba(120,120,130,.38);
box-shadow:0 2px 12px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.18),inset 0 -1px 0 rgba(0,0,0,.2);
border:1px solid rgba(255,255,255,.12);
color:#fff;
}
/* Number buttons — dark glass */
.ck-num{
background:rgba(50,50,60,.55);
box-shadow:0 2px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1),inset 0 -1px 0 rgba(0,0,0,.25);
border:1px solid rgba(255,255,255,.07);
color:#fff;
}
/* Operator buttons — amber liquid glass */
.ck-op{
background:linear-gradient(145deg,rgba(255,175,30,.85),rgba(230,140,0,.9));
box-shadow:0 3px 16px rgba(255,160,0,.35),inset 0 1px 0 rgba(255,255,255,.35),inset 0 -1px 0 rgba(0,0,0,.2);
border:1px solid rgba(255,200,80,.3);
color:#fff;font-size:30px;font-weight:200;
}
.ck-op.op-lit{
background:linear-gradient(145deg,rgba(255,175,30,.22),rgba(230,140,0,.18));
box-shadow:0 2px 10px rgba(255,160,0,.15),inset 0 1px 0 rgba(255,200,80,.2);
border:1px solid rgba(255,160,0,.4);
color:#ff9f0a;
}

/* Small buttons (bottom row) */
.ck-sm{
border:none;cursor:pointer;font-family:inherit;
border-radius:50%;aspect-ratio:1;
display:flex;align-items:center;justify-content:center;
font-size:26px;font-weight:400;
width:100%;
-webkit-user-select:none;user-select:none;
position:relative;overflow:hidden;
backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
transition:transform .12s cubic-bezier(.34,1.3,.64,1),box-shadow .12s;
}
.ck-sm::before{
content:’’;position:absolute;top:0;left:0;right:0;height:50%;
background:linear-gradient(180deg,rgba(255,255,255,.15) 0%,transparent 100%);
border-radius:50% 50% 0 0;pointer-events:none;
}
.ck-sm:active{transform:scale(.88);}

.ck-dot{
background:rgba(50,50,60,.55);
box-shadow:0 2px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1);
border:1px solid rgba(255,255,255,.07);
color:#fff;font-size:30px;font-weight:500;
}
.ck-eq{
background:linear-gradient(145deg,rgba(255,175,30,.85),rgba(230,140,0,.9));
box-shadow:0 3px 16px rgba(255,160,0,.35),inset 0 1px 0 rgba(255,255,255,.35);
border:1px solid rgba(255,200,80,.3);
color:#fff;font-size:30px;font-weight:200;
}
/* Done button — subtle white glass */
.ck-done{
background:rgba(255,255,255,.15);
box-shadow:0 2px 14px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.25),inset 0 -1px 0 rgba(0,0,0,.15);
border:1px solid rgba(255,255,255,.18);
color:#fff;font-size:12px;font-weight:800;letter-spacing:.3px;
border-radius:50%;aspect-ratio:1;
cursor:pointer;font-family:inherit;
display:flex;align-items:center;justify-content:center;
width:100%;
backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
transition:transform .12s cubic-bezier(.34,1.3,.64,1),box-shadow .12s;
-webkit-user-select:none;user-select:none;
position:relative;overflow:hidden;
}
.ck-done::before{
content:’’;position:absolute;top:0;left:0;right:0;height:50%;
background:linear-gradient(180deg,rgba(255,255,255,.2) 0%,transparent 100%);
border-radius:50% 50% 0 0;pointer-events:none;
}
.ck-done:active{transform:scale(.88);}

/* Zero button — wide pill, glass */
.ck-zero{
border:none;cursor:pointer;font-family:inherit;
border-radius:100px;
display:flex;align-items:center;padding-left:28px;
font-size:26px;font-weight:400;
color:#fff;
background:rgba(50,50,60,.55);
box-shadow:0 2px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1),inset 0 -1px 0 rgba(0,0,0,.25);
border:1px solid rgba(255,255,255,.07);
transition:transform .12s,box-shadow .12s;
-webkit-user-select:none;user-select:none;
height:100%;min-height:72px;
position:relative;overflow:hidden;
backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
/* Pill top highlight */
.ck-zero::before{
content:’’;position:absolute;top:0;left:0;right:0;height:45%;
background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 100%);
border-radius:100px 100px 0 0;pointer-events:none;
}
.ck-zero:active{transform:scale(.97);filter:brightness(1.15);}

/* DRUM PICKER */
.drum-wrap{position:relative;height:260px;overflow:hidden;cursor:grab;-webkit-user-select:none;user-select:none;touch-action:none;margin:0 0 4px}
.drum-wrap:active{cursor:grabbing}
.drum-track{position:absolute;left:0;right:0;display:flex;flex-direction:column;will-change:transform;padding:0 24px}
/* iOS-style item: perspective scaling */
.drum-item-el{height:44px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:400;color:rgba(120,120,128,.5);flex-shrink:0;pointer-events:none;transition:none;letter-spacing:-.2px}
.drum-item-el.d1{font-size:20px;font-weight:500;color:rgba(120,120,128,.75)}
.drum-item-el.center{font-size:26px;font-weight:700;color:var(–t1)}
/* Selection indicator — iOS-style frosted lines */
.drum-sel-box{position:absolute;left:16px;right:16px;height:44px;top:108px;border-top:1px solid var(–sep);border-bottom:1px solid var(–sep);pointer-events:none;z-index:2;border-radius:4px}
/* Gradient fades */
.drum-fade-t{position:absolute;left:0;right:0;top:0;height:108px;background:linear-gradient(to bottom,var(–card) 0%,rgba(255,255,255,0) 100%);pointer-events:none;z-index:3}
.drum-fade-b{position:absolute;left:0;right:0;bottom:0;height:108px;background:linear-gradient(to top,var(–card) 0%,rgba(255,255,255,0) 100%);pointer-events:none;z-index:3}
@media(prefers-color-scheme:dark){
.drum-fade-t{background:linear-gradient(to bottom,var(–card) 0%,transparent 100%)}
.drum-fade-b{background:linear-gradient(to top,var(–card) 0%,transparent 100%)}
}
.drum-unit{text-align:center;font-size:13px;color:var(–t2);font-weight:600;padding:0 0 4px}
.drum-confirm-row{display:flex;gap:10px;padding:4px 14px 6px}
.drum-cancel{flex:1;padding:13px;border:none;border-radius:var(–r-lg);background:var(–bg2);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;color:var(–t2)}
.drum-ok{flex:2;padding:13px;border:none;border-radius:var(–r-lg);background:var(–blue);color:white;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.32)}

/* SETTINGS */
.set-wrap{border-radius:var(–r-xl);overflow:hidden;box-shadow:var(–sh)}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(–card);border-bottom:1px solid var(–sep);transition:background .15s}
.set-row:last-child{border-bottom:none}
.set-row:hover{background:var(–sep2)}
.set-l{display:flex;align-items:center;gap:9px}
.set-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.set-lbl{font-size:14px;font-weight:600}
.set-sub{font-size:11px;color:var(–t2);margin-top:1px}
.set-btn{font-size:12px;font-weight:700;border:none;border-radius:9px;padding:6px 13px;cursor:pointer;font-family:inherit;transition:all .15s}
.set-btn-blue{background:var(–bl);color:var(–blue)}
.set-btn-red{background:var(–rl);color:var(–red)}
.set-btn-green{background:var(–gl);color:var(–green)}

/* LOC SETTINGS - long-press drag */
.loc-set-item{display:flex;align-items:center;gap:7px;padding:10px 15px;background:var(–card);border-bottom:1px solid var(–sep);position:relative;transition:box-shadow .2s,transform .2s,opacity .2s;}
.loc-set-item:last-child{border-bottom:none}
.loc-set-item.is-dragging{opacity:.5;box-shadow:var(–sh-xl);transform:scale(1.02);z-index:10;border-radius:var(–r-md);}
.loc-set-item.drag-over-top{border-top:2.5px solid var(–blue);}
.loc-set-item.drag-over-bot{border-bottom:2.5px solid var(–blue);}
.loc-drag-handle{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(–t3);font-size:18px;flex-shrink:0;cursor:grab;-webkit-user-select:none;user-select:none;touch-action:none;}
.loc-drag-handle:active{cursor:grabbing;}
.loc-del-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:#ff3b30;display:flex;align-items:center;justify-content:center;font-size:22px;opacity:0;transition:opacity .2s;pointer-events:none;border-radius:0 0 0 0;}
.loc-set-item.swiped .loc-del-bg{opacity:1;pointer-events:all;}
.loc-set-item.swiped{transform:translateX(-80px);}
.loc-color-btn{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.4);cursor:pointer;flex-shrink:0;transition:transform .15s;box-shadow:var(–sh-s)}
.loc-color-btn:hover{transform:scale(1.15)}
.loc-name-input{flex:1;border:none;outline:none;background:transparent;font-family:inherit;font-size:14px;font-weight:700;color:var(–t1);-webkit-text-fill-color:var(–t1)}
.loc-reform-toggle{font-size:9.5px;font-weight:800;border:none;border-radius:6px;padding:3px 7px;cursor:pointer;font-family:inherit;background:var(–bg2);color:var(–t2);flex-shrink:0}
.loc-reform-toggle.on{background:var(–pl);color:var(–purple)}
.loc-del{border:none;background:none;color:var(–t3);font-size:15px;cursor:pointer;padding:3px 5px;border-radius:6px;transition:all .15s;line-height:1;flex-shrink:0}
.loc-del:hover{background:var(–rl);color:var(–red)}
.add-loc-btn{width:100%;padding:13px;border:none;border-radius:var(–r-xl);background:var(–card);box-shadow:var(–sh-s);color:var(–blue);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;border:1.5px dashed rgba(37,99,235,.3);margin-top:8px;display:block}
.add-loc-btn:hover{background:var(–bl);border-color:var(–blue)}

/* COLOR PICKER */
.color-popup{position:fixed;z-index:500;background:var(–card);border-radius:18px;padding:13px;box-shadow:var(–sh-xl);display:none;flex-wrap:wrap;gap:8px;width:196px}
.color-popup.open{display:flex}
.cp-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .18s cubic-bezier(.34,1.2,.64,1)}
.cp-dot:hover{transform:scale(1.15)}
.cp-dot.sel{border-color:white;transform:scale(1.1);box-shadow:0 3px 10px rgba(0,0,0,.3)}

/* iOS TOGGLE */
.ios-toggle{position:relative;width:46px;height:27px;flex-shrink:0}
.ios-toggle input{opacity:0;width:0;height:0;position:absolute}
.ios-slider{position:absolute;inset:0;border-radius:13px;background:var(–bg2);cursor:pointer;transition:background .25s cubic-bezier(.4,0,.2,1)}
.ios-slider::after{content:’’;position:absolute;width:21px;height:21px;border-radius:50%;background:white;top:3px;left:3px;transition:transform .25s cubic-bezier(.34,1.4,.64,1);box-shadow:0 2px 6px rgba(0,0,0,.22)}
.ios-toggle input:checked+.ios-slider{background:var(–blue)}
.ios-toggle input:checked+.ios-slider::after{transform:translateX(19px)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(5px);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(102%);width:100%;max-width:700px;max-height:88vh;background:var(–card);border-radius:26px 26px 0 0;padding:8px 17px 40px;z-index:201;overflow-y:auto;transition:transform .38s cubic-bezier(.32,.72,0,1)}
.modal-sheet.open{transform:translateX(-50%) translateY(0)}
.m-handle{width:36px;height:4px;border-radius:2px;background:var(–sep);margin:10px auto 16px;cursor:grab}
.m-close{position:absolute;top:17px;right:17px;width:27px;height:27px;border-radius:50%;background:var(–bg2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(–t2)}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(–sep)}
.mrow:last-child{border-bottom:none}
.mrow-l{font-size:13.5px;color:var(–t2)}
.mrow-v{font-size:13.5px;font-weight:800}
.m-act{display:flex;gap:8px;margin-top:15px}
.m-edit-btn{flex:1;padding:12px;border:none;border-radius:var(–r-lg);background:var(–blue);color:white;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}
.m-del-btn{padding:12px 15px;border:none;border-radius:var(–r-lg);background:var(–rl);color:var(–red);font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}

.copy-btn{width:100%;padding:14px;border:none;border-radius:var(–r-xl);background:var(–green);color:white;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;transition:all .22s;box-shadow:0 4px 18px rgba(22,163,74,.28);margin-top:10px}
.copy-btn:hover{transform:translateY(-1px)}

.empty{text-align:center;padding:48px 20px}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.5}
.empty-txt{font-size:14px;color:var(–t3);font-weight:600}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(24,24,27,.94);color:white;padding:10px 20px;border-radius:20px;font-size:13.5px;font-weight:700;opacity:0;pointer-events:none;transition:all .28s cubic-bezier(.34,1.2,.64,1);backdrop-filter:blur(12px);white-space:nowrap;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.22)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){
.etbl-hdr,.erow{grid-template-columns:48px 1fr 68px 68px}
.etbl-hdr span:last-child,.erow>*:last-child{display:none}
}

/* ══ CLIENTS ══ */
.cl-card{background:var(–card);border-radius:var(–r-xl);box-shadow:var(–sh);overflow:hidden;margin-bottom:10px;cursor:pointer;transition:transform .15s}
.cl-card:active{transform:scale(.985)}
.cl-card-top{display:flex;align-items:center;gap:12px;padding:14px 16px}
.cl-avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:white;flex-shrink:0;letter-spacing:-.5px}
.cl-name{font-size:16px;font-weight:700;letter-spacing:-.2px}
.cl-phone{font-size:13px;color:var(–t2);margin-top:2px;display:flex;align-items:center;gap:4px}
.cl-tags{display:flex;flex-wrap:wrap;gap:5px;padding:0 16px 12px}
.cl-tag{font-size:11px;font-weight:600;background:var(–bg2);color:var(–t2);border-radius:8px;padding:3px 9px}
.cl-tag.loc{color:white}
.cl-empty{text-align:center;padding:60px 20px;color:var(–t3)}
.cl-empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.cl-empty-txt{font-size:15px;font-weight:600;margin-bottom:6px}
.cl-empty-sub{font-size:13px;opacity:.7}

/* Client form sheet */
.cf-row{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.cf-lbl{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(–t3);padding-left:2px}
.cf-input{border:none;outline:none;background:var(–bg2);border-radius:12px;padding:12px 14px;font-family:inherit;font-size:15px;font-weight:500;color:var(–t1);-webkit-text-fill-color:var(–t1);width:100%;border:1.5px solid var(–sep)}
@media(prefers-color-scheme:dark){.cf-input{background:#2c2c2e;border-color:rgba(255,255,255,.12)}.cf-input::placeholder{color:#636366;-webkit-text-fill-color:#636366}}
.cf-input::placeholder{color:var(–t3);-webkit-text-fill-color:var(–t3)}
textarea.cf-input{resize:none;height:80px;line-height:1.5}
.cf-loc-grid{display:flex;flex-wrap:wrap;gap:6px}
.cf-loc-btn{flex:1;min-width:80px;padding:9px 8px;border:1.5px solid var(–sep);border-radius:12px;background:var(–card);font-family:inherit;font-size:12px;font-weight:600;color:var(–t2);cursor:pointer;text-align:center;transition:all .18s}
.cf-loc-btn.active{color:white;border-color:transparent}
.cf-actions{display:flex;gap:10px;margin-top:6px}
.cf-save{flex:2;padding:14px;border:none;border-radius:var(–r-lg);background:var(–blue);color:white;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.3)}
.cf-del{flex:1;padding:14px;border:none;border-radius:var(–r-lg);background:var(–rl);color:var(–red);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
.cf-cancel{flex:1;padding:14px;border:none;border-radius:var(–r-lg);background:var(–bg2);color:var(–t2);font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}

/* ══ BOTTOM TAB BAR — iOS 26 Liquid Glass Style ══ */
.tab-bar{
position:fixed;bottom:0;left:0;right:0;z-index:95;
display:flex;align-items:center;
/* Ultra transparent — barely there */
background:rgba(240,240,248,.28);
backdrop-filter:blur(40px) saturate(180%);
-webkit-backdrop-filter:blur(40px) saturate(180%);
border-top:1px solid rgba(255,255,255,.22);
padding-bottom:env(safe-area-inset-bottom);
height:calc(60px + env(safe-area-inset-bottom));
}
@media(prefers-color-scheme:dark){
.tab-bar{
background:rgba(8,8,14,.3);
border-top:1px solid rgba(255,255,255,.04);
}
}

/* No ::before global indicator — each button has its own pill */
.tab-btn{
flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
gap:1px;border:none;background:none;cursor:pointer;
padding:5px 4px 4px;
color:rgba(120,120,140,.8);
transition:color .25s ease;
-webkit-user-select:none;user-select:none;
position:relative;z-index:1;
}
.tab-btn:active .tab-icon-wrap{transform:scale(.85);}

/* Wrapper for icon — the pill lives here */
.tab-icon-wrap{
position:relative;
display:flex;align-items:center;justify-content:center;
gap:5px;
width:44px;height:34px;
border-radius:20px;
transition:
width .44s cubic-bezier(.34,1.2,.64,1),
padding .44s cubic-bezier(.34,1.2,.64,1),
background .3s ease,
box-shadow .3s ease,
transform .15s cubic-bezier(.34,1.3,.64,1);
overflow:hidden;
padding:0 10px;
}
/* Glass pill shimmer pseudo */
.tab-icon-wrap::before{
content:’’;
position:absolute;inset:0;
border-radius:inherit;
background:linear-gradient(160deg,rgba(255,255,255,.55) 0%,rgba(255,255,255,0) 60%);
opacity:0;
transition:opacity .3s ease;
pointer-events:none;
}

/* ACTIVE state — expanded pill with glass */
.tab-btn.active .tab-icon-wrap{
width:auto;
min-width:72px;
padding:0 14px;
background:rgba(255,255,255,.72);
box-shadow:
0 3px 18px rgba(0,0,0,.1),
0 1px 4px rgba(0,0,0,.06),
inset 0 1.5px 0 rgba(255,255,255,.95),
inset 0 -1px 0 rgba(0,0,0,.04);
border:1px solid rgba(255,255,255,.55);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
}
.tab-btn.active .tab-icon-wrap::before{opacity:1;}
@media(prefers-color-scheme:dark){
.tab-btn.active .tab-icon-wrap{
background:rgba(68,72,100,.55);
box-shadow:
0 3px 18px rgba(0,0,0,.35),
0 1px 4px rgba(0,0,0,.25),
inset 0 1px 0 rgba(255,255,255,.14),
inset 0 -1px 0 rgba(0,0,0,.3);
border:1px solid rgba(255,255,255,.08);
}
}

.tab-icon{
display:flex;align-items:center;justify-content:center;flex-shrink:0;color:inherit;
transition:transform .38s cubic-bezier(.34,1.4,.64,1);
position:relative;z-index:1;
}
.tab-btn.active .tab-icon{transform:scale(1.1);}

.tab-btn.active{color:var(–blue);}
@media(prefers-color-scheme:dark){
.tab-btn.active{color:#7db8f7;}
.tab-btn{color:rgba(160,160,180,.65);}
}

.tab-lbl{font-size:9.5px;font-weight:600;letter-spacing:-.15px;white-space:nowrap;transition:color .25s ease;}
/* Label INSIDE the pill — visible only when active */
.tab-lbl-in{
display:none;font-size:11px;font-weight:700;letter-spacing:-.2px;
white-space:nowrap;max-width:0;overflow:hidden;
transition:max-width .4s cubic-bezier(.34,1.2,.64,1),opacity .3s ease;
opacity:0;
}
.tab-btn.active .tab-lbl-in{
display:block;max-width:70px;opacity:1;
}
/* Label BELOW — visible only when inactive */
.tab-lbl-out{
font-size:9.5px;font-weight:600;display:block;margin-top:2px;
transition:opacity .2s ease;
}
.tab-btn.active .tab-lbl-out{display:none;}
.main{padding-bottom:calc(76px + env(safe-area-inset-bottom))!important}

/* Emoji picker */
.emoji-picker-ov{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.45);backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.emoji-picker-ov.open{opacity:1;pointer-events:all}
.emoji-picker-box{background:var(–card);border-radius:26px 26px 0 0;width:100%;max-width:500px;padding:16px 16px calc(env(safe-area-inset-bottom)+16px);max-height:60vh;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);box-shadow:var(–sh-xl)}
.emoji-picker-ov.open .emoji-picker-box{transform:translateY(0)}
.emoji-picker-title{text-align:center;font-size:12px;font-weight:700;color:var(–t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;overflow-y:auto;max-height:calc(60vh - 80px)}
.emoji-btn{border:none;background:none;font-size:24px;padding:6px;border-radius:10px;cursor:pointer;transition:background .12s,transform .12s cubic-bezier(.34,1.3,.64,1);aspect-ratio:1;display:flex;align-items:center;justify-content:center}
.emoji-btn:hover{background:var(–bg2)}
.emoji-btn:active{transform:scale(.85);background:var(–bl)}
.emoji-btn.selected{background:var(–bl);outline:2px solid var(–blue)}

/* Pct slider sheet */
.pct-display{text-align:center;padding:20px 20px 10px;background:#1c1c1e}
.pct-big{font-size:72px;font-weight:200;letter-spacing:-4px;color:#fff;line-height:1}
.pct-unit{font-size:24px;font-weight:300;color:#8e8e93}
.pct-slider-wrap{padding:0 24px 8px;background:#1c1c1e}
input.pct-range{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;outline:none;cursor:pointer;background:linear-gradient(to right,#ff9f0a 0%,#ff9f0a var(–pct-fill,45%),#3a3a3c var(–pct-fill,45%),#3a3a3c 100%)}
input.pct-range::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:grab}
input.pct-range::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:#fff;border:none;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.pct-presets{display:flex;gap:8px;padding:0 20px 12px;background:#1c1c1e;justify-content:center}
.pct-preset{padding:8px 16px;border:none;border-radius:20px;background:#2c2c2e;color:#8e8e93;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.pct-preset.on{background:#ff9f0a;color:#000}

/* ── CARD ANIMATION ── */
@keyframes cardIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.sc.anim{animation:cardIn .38s cubic-bezier(.34,1.2,.64,1) both}
.anim-d1{animation-delay:.04s}.anim-d2{animation-delay:.08s}
.anim-d3{animation-delay:.12s}.anim-d4{animation-delay:.16s}
.anim-d5{animation-delay:.20s}.anim-d6{animation-delay:.24s}
.anim-d7{animation-delay:.28s}.anim-d8{animation-delay:.32s}

/* ── ODOMETER ── */
.odo-wrap{display:inline-block;overflow:hidden;height:1.1em;vertical-align:bottom}
.odo-inner{display:flex;flex-direction:column;transition:transform .45s cubic-bezier(.4,0,.2,1)}

/* ── PULL TO REFRESH ── */
.ptr-indicator{
position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-60px);
background:var(–card);border-radius:20px;padding:8px 16px;
box-shadow:var(–sh);font-size:13px;font-weight:700;color:var(–blue);
display:flex;align-items:center;gap:6px;z-index:89;
transition:transform .3s cubic-bezier(.34,1.2,.64,1),opacity .3s;
opacity:0;pointer-events:none;
}
.ptr-indicator.visible{transform:translateX(-50%) translateY(0);opacity:1}
.ptr-spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DAY CHART ── */
.day-chart{padding:14px 16px 10px;overflow-x:auto;scrollbar-width:none}
.day-chart::-webkit-scrollbar{display:none}
.day-chart-inner{display:flex;align-items:flex-end;gap:4px;min-width:max-content;height:96px}
.day-bar{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.day-bar-fill{width:18px;border-radius:5px 5px 0 0;min-height:3px;transition:opacity .15s}
.day-bar:hover .day-bar-fill{opacity:.75}
.day-bar-lbl{font-size:8.5px;font-weight:600;color:var(–t3);white-space:nowrap}
.day-bar-off{width:18px;border-radius:5px;background:var(–bg2);height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(–t3)}

/* ── PARALLAX CARDS ── */
.sg.parallax-group .sc{will-change:transform;transition:transform .1s linear,box-shadow .2s}

/* ── DAY OFF ── */
.dayoff-btn{
width:100%;padding:13px;border:1.5px dashed rgba(120,120,140,.3);
border-radius:var(–r-xl);background:none;font-family:inherit;
font-size:14px;font-weight:600;color:var(–t3);cursor:pointer;
transition:all .2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:7px
}
.dayoff-btn:hover,.dayoff-btn:active{background:var(–bg2);border-color:var(–t3)}
.dayoff-btn.on{background:var(–rl);border-color:var(–red);color:var(–red)}
@media(prefers-color-scheme:dark){
#cl-fab{background:rgba(60,65,100,.6)!important;color:#7db8f7!important;border-color:rgba(255,255,255,.08)!important;box-shadow:0 4px 24px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1)!important}
}</style>

/* ══════════════════════════════════════════
   HAPTIC FEEDBACK
   iOS Safari: no Vibration API → use AudioContext click (silent but triggers Taptic)
   Android/others: use navigator.vibrate
══════════════════════════════════════════ */
let _ac=null;
function hap(type){
  // Try native vibration (Android, some browsers)
  if(navigator.vibrate){
    if(type==='light')navigator.vibrate(6);
    else if(type==='medium')navigator.vibrate(15);
    else if(type==='heavy')navigator.vibrate([12,6,12]);
    else if(type==='selection')navigator.vibrate(4);
    else if(type==='error')navigator.vibrate([20,10,20]);
    return;
  }
  // iOS Safari fallback: AudioContext tiny click (won't vibrate but won't error)
  try{
    if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();
    if(_ac.state==='suspended')_ac.resume();
    const o=_ac.createOscillator(),g=_ac.createGain();
    o.connect(g);g.connect(_ac.destination);
    const dur=type==='heavy'?0.04:type==='medium'?0.025:0.012;
    g.gain.setValueAtTime(0.0001,_ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.00001,_ac.currentTime+dur);
    o.start(_ac.currentTime);o.stop(_ac.currentTime+dur);
  }catch(e){}
}
// Add haptic to all interactive elements
document.addEventListener('touchstart',e=>{
  const t=e.target.closest('button,.loc-pill,.frow,.cd,.pm,.mnav-btn,.cal-nav,.tab-btn,.ck,.ck-zero,.ck-sm,.ck-done,.drum-ok,.drum-cancel,.copy-btn,.save-btn,.m-edit-btn,.m-del-btn');
  if(t)hap('light');
},{passive:true});

function fmtDisp(v){
const s=String(v);const n=parseFloat(s);if(isNaN(n))return’0’;
if(s.endsWith(’.’))return n.toLocaleString(‘pl-PL’)+’,’;
if(s.includes(’.’)){const pts=s.split(’.’);return pts[0].replace(/\B(?=(\d{3})+(?!\d))/g,’ ‘)+’,’+pts[1]}
return n.toLocaleString(‘pl-PL’);
}

function cDig(d){

}
function cDot(){
if(cJustEvaled){cTokens=[];cJustEvaled=false;}
if(cNewNum){cCur=‘0.’;cNewNum=false;}
else if(!cCur.includes(’.’))cCur+=’.’;

}
function cDel(){
if(cNewNum){
if(cTokens.length>=2){cTokens.pop();const prev=cTokens.pop();cCur=String(prev);cLastOp=cTokens.length?cTokens[cTokens.length-1]:null;}
else{cCur=‘0’;cTokens=[];cLastOp=null;}
cNewNum=false;cJustEvaled=false;
} else {
cCur=cCur.length>1?cCur.slice(0,-1):‘0’;
if(cCur===‘0’)cNewNum=true;
}
renderCalcBody();
}
function cAC(){cTokens=[];cCur=‘0’;cNewNum=true;cLastOp=null;cJustEvaled=false;renderCalcBody();}
function cPct(){cCur=String(Math.round(parseFloat(cCur)/100*1e10)/1e10);updDispOnly();}

function cSetOp(op){
cJustEvaled=false;
const n=parseFloat(cCur);
if(!cNewNum){
cTokens.push(n);
cTokens.push(op);
cNewNum=true;
} else {

if(cTokens.length&&typeof cTokens[cTokens.length-1]===‘string’){
cTokens[cTokens.length-1]=op;
} else {
cTokens.push(n);
cTokens.push(op);
cNewNum=true;
}
}
cLastOp=op;
renderCalcBody();
}

/* Evaluate with correct operator precedence: * / before + - */
function evalTokens(toks){
if(!toks.length)return 0;
let arr=[…toks];
// Pass 1: * and /
let i=1;
while(i<arr.length){
if(arr[i]===’*’||arr[i]===’/’){
const res=arr[i]===’*’?arr[i-1]*arr[i+1]:(arr[i+1]!==0?arr[i-1]/arr[i+1]:0);
arr.splice(i-1,3,Math.round(res*1e8)/1e8);
} else i+=2;
}
// Pass 2: + and -
let result=arr[0];
for(let j=1;j<arr.length;j+=2){
if(arr[j]===’+’)result+=arr[j+1];
else if(arr[j]===’-’)result-=arr[j+1];
}
return Math.round(result*1e8)/1e8;
}

function cEquals(){
if(!cTokens.length)return;
const toks=[…cTokens];
if(!cNewNum)toks.push(parseFloat(cCur));
const exprFull=buildExprStr()+(cNewNum?’’:’ ‘+fmtDisp(cCur));
const result=evalTokens(toks);
const r=Math.round(result*100)/100;
cCur=String(r);cTokens=[];cNewNum=true;cLastOp=null;cJustEvaled=true;
renderCalcBody();
const eh=document.getElementById(‘c-hist’);
if(eh){eh.textContent=exprFull+’ = ’+fmtDisp(String(r));eh.scrollLeft=eh.scrollWidth;}
}

function cDone(){
const toks=[…cTokens];
if(!cNewNum)toks.push(parseFloat(cCur));
let v=toks.length?evalTokens(toks):parseFloat(cCur)||0;
v=Math.round(v*100)/100;
if(isNaN(v)||!isFinite(v))v=0;
setFval(cKey,v);closeSheet();
}

const DRUM_H=44;   // item height px — matches .drum-item-el height
const DRUM_VIS=3;  // visible items on each side of center
let drumKey=’’,drumItems=[],drumIdx=0;

function openDrum(key,min,max,current,step,unit){
drumKey=key;drumItems=[];
for(let v=min;v<=max;v=Math.round((v+step)*1e6)/1e6)drumItems.push(v);
let best=0,bestDist=Infinity;
drumItems.forEach((v,i)=>{const d=Math.abs(v-current);if(d<bestDist){bestDist=d;best=i}});
drumIdx=best;
document.getElementById(‘sheet-title’).textContent=T.drumTitle;
renderDrumBody(unit);openSheet();
}

function renderDrumBody(unit){
document.getElementById(‘sheet-body’).innerHTML=` <div class="drum-wrap" id="drum-wrap"> <div class="drum-track" id="drum-track"></div> <div class="drum-sel-box"></div> <div class="drum-fade-t"></div> <div class="drum-fade-b"></div> </div> ${unit?`<div class="drum-unit">${unit}</div>`:''} <div class="drum-confirm-row"> <button class="drum-cancel" onclick="closeSheet()">${T.cancel}</button> <button class="drum-ok" onclick="drumDone()">${T.done}</button> </div>`;
drumRender(drumIdx,0);
drumSetupTouch();
}

/* Center of picker = 130px from top of drum-wrap */
const DRUM_CENTER=130;

function drumOffsetForIdx(idx){
// translateY so item[idx] is centered at DRUM_CENTER
return DRUM_CENTER - idx*DRUM_H - DRUM_H/2;
}

function drumRender(centerIdx, extra){
const track=document.getElementById(‘drum-track’);
if(!track)return;
// Offset so centerIdx is at DRUM_CENTER
const offset=drumOffsetForIdx(centerIdx)+extra;
track.style.transform=`translateY(${offset}px)`;

// Compute which item is actually centered given offset
const actualCenter=Math.round((DRUM_CENTER-DRUM_H/2-offset)/DRUM_H);

// Build all items with correct class
let html=’’;
for(let i=0;i<drumItems.length;i++){
const dist=Math.abs(i-actualCenter);
let cls=‘drum-item-el’;
if(dist===0) cls+=’ center’;
else if(dist===1) cls+=’ d1’;
const fmtV=drumItems[i]%1===0?String(drumItems[i]):drumItems[i].toFixed(1);
html+=`<div class="${cls}">${fmtV}</div>`;
}
track.innerHTML=html;
}

function drumSnapTo(idx, vel){
const finalIdx=Math.max(0,Math.min(drumItems.length-1,idx));
if(finalIdx!==drumIdx) hap(‘selection’);
drumIdx=finalIdx;
const track=document.getElementById(‘drum-track’);
if(!track)return;
// Velocity-based spring duration
const dist=Math.abs(parseFloat(track.style.transform.match(/translateY(([^p]+)px)/)?.[1]||0) - drumOffsetForIdx(drumIdx));
const spd=Math.max(Math.abs(vel),200);
const dur=Math.max(220,Math.min(500,dist/spd*1000));
track.style.transition=`transform ${dur}ms cubic-bezier(.32,.72,0,1)`;
track.style.transform=`translateY(${drumOffsetForIdx(drumIdx)}px)`;
setTimeout(()=>{
track.style.transition=‘none’;
drumRender(drumIdx,0);
},dur+20);
}

function drumSetupTouch(){
const wrap=document.getElementById(‘drum-wrap’);
if(!wrap)return;
let startY=0,curOffset=0,vel=0,lastY=0,lastT=0,active=false,prevIdx=-1;

function getOffset(){
const t=document.getElementById(‘drum-track’);
if(!t)return drumOffsetForIdx(drumIdx);
const m=t.style.transform.match(/translateY(([^p]+)px)/);
return m?parseFloat(m[1]):drumOffsetForIdx(drumIdx);
}
function offsetToIdx(off){
return Math.max(0,Math.min(drumItems.length-1,Math.round((DRUM_CENTER-DRUM_H/2-off)/DRUM_H)));
}

wrap.addEventListener(‘touchstart’,e=>{
e.preventDefault();
const t=e.touches[0];
startY=t.clientY;curOffset=getOffset();vel=0;lastY=startY;lastT=Date.now();active=true;prevIdx=drumIdx;
const track=document.getElementById(‘drum-track’);
if(track)track.style.transition=‘none’;
},{passive:false});

wrap.addEventListener(‘touchmove’,e=>{
if(!active)return;
e.preventDefault();
const t=e.touches[0];
const dt=Math.max(Date.now()-lastT,1);
vel=(t.clientY-lastY)/dt*1000;
lastY=t.clientY;lastT=Date.now();
const dy=t.clientY-startY;
const newOff=curOffset+dy;
// Elastic bounds
const minOff=drumOffsetForIdx(drumItems.length-1)-DRUM_H;
const maxOff=drumOffsetForIdx(0)+DRUM_H;
let clamped=newOff;
if(newOff<minOff) clamped=minOff+(newOff-minOff)*0.2;
if(newOff>maxOff) clamped=maxOff+(newOff-maxOff)*0.2;
const track=document.getElementById(‘drum-track’);
if(track) track.style.transform=`translateY(${clamped}px)`;
// Live item highlighting
const idx=offsetToIdx(clamped);
if(idx!==prevIdx){hap(‘selection’);prevIdx=idx;}
drumRender(idx, clamped-drumOffsetForIdx(idx));
},{passive:false});

function onEnd(){
if(!active)return;active=false;
const off=getOffset();
const momentum=vel*0.16;
const targetOff=off+momentum;
const idx=offsetToIdx(targetOff);
drumSnapTo(idx,vel);
}

wrap.addEventListener(‘touchend’,onEnd,{passive:true});
wrap.addEventListener(‘touchcancel’,onEnd,{passive:true});

// Mouse support
wrap.addEventListener(‘mousedown’,e=>{
startY=e.clientY;curOffset=getOffset();vel=0;lastY=startY;lastT=Date.now();active=true;prevIdx=drumIdx;
const track=document.getElementById(‘drum-track’);if(track)track.style.transition=‘none’;
const mm=ev=>{
const dt=Math.max(Date.now()-lastT,1);vel=(ev.clientY-lastY)/dt*1000;lastY=ev.clientY;lastT=Date.now();
const dy=ev.clientY-startY;const newOff=curOffset+dy;
const track=document.getElementById(‘drum-track’);if(track)track.style.transform=`translateY(${newOff}px)`;
const idx=offsetToIdx(newOff);if(idx!==prevIdx){hap(‘selection’);prevIdx=idx;}
drumRender(idx,newOff-drumOffsetForIdx(idx));
};
const mu=()=>{document.removeEventListener(‘mousemove’,mm);document.removeEventListener(‘mouseup’,mu);onEnd()};
document.addEventListener(‘mousemove’,mm);document.addEventListener(‘mouseup’,mu);
});
}

function drumDone(){hap(‘medium’);setFval(drumKey,drumItems[drumIdx]);closeSheet()}

/* FIX #2: Save uses selDate (which can be changed by user picking a new date in edit mode) */
function saveEntry(){
if(!selDate){showToast(T.selectDate);return}
const noteEl=document.getElementById(‘fnote’);if(noteEl)fVals.notes=noteEl.value;
const loc=locs[curLoc];
const entry={
id:editId||Date.now(),
date:selDate,
loc:curLoc,locId:loc?loc.id:0,
hours:fVals.hours,clients:fVals.clients,revenue:fVals.revenue,
pct:curPct,tips:fVals.tips,tipsCash:fVals.tipsCash||0,vouchers:fVals.vouchers,discounts:fVals.discounts,notes:fVals.notes,
myPctAmt:fVals.revenue*curPct/100,total:(fVals.revenue*curPct/100)+fVals.tips,
realTotal:(fVals.revenue*curPct/100)+fVals.tips+(fVals.tipsCash||0),
isReform:loc?loc.isReform:false,
};
if(editId){
// Check: if loc changed and another entry already exists for this new loc+date — overwrite that one
const existingForLoc=entries.find(e=>e.date===selDate&&e.locId===entry.locId&&e.id!==editId&&isReal(e));
if(existingForLoc){
// Merge: remove the conflicting entry, update current
entries=entries.filter(e=>e.id!==existingForLoc.id);
}
entries=entries.map(e=>e.id===editId?entry:e);
showToast(T.updated);
} else {
// New entry — check if one already exists for this loc+date
const dup=entries.find(e=>e.date===selDate&&e.locId===entry.locId&&isReal(e));
if(dup){
// Update existing instead of duplicating
entry.id=dup.id;
entries=entries.map(e=>e.id===dup.id?entry:e);
showToast(T.updated);
} else {
entries.push(entry);
showToast(T.saved);
}
}
entries.sort((a,b)=>a.date.localeCompare(b.date));
hap(‘medium’);saveAll();cancelEdit();updDateDisplay();renderCal();
}

function setupModalSwipe(){
const handle=document.getElementById(‘m-handle’);
const sheet=document.getElementById(‘modal-sheet’);
if(!handle||!sheet)return;

let startY=0,startT=0,velY=0,lastY=0,isDrag=false,active=false;

// Swipe on handle OR anywhere in top 60px of sheet
function shouldCapture(e){
const t=e.target;
if(t.closest(‘input,textarea,button,.mrow,.m-act’))return false;
const r=sheet.getBoundingClientRect();
const relY=e.touches[0].clientY-r.top;
return relY<80||t===handle||t.closest(’.m-handle’);
}

sheet.addEventListener(‘touchstart’,e=>{
if(!shouldCapture(e))return;
startY=e.touches[0].clientY;lastY=startY;startT=Date.now();velY=0;active=true;isDrag=false;
},{passive:true});

sheet.addEventListener(‘touchmove’,e=>{
if(!active)return;
const y=e.touches[0].clientY;
const dy=y-startY;
const dt=Math.max(Date.now()-startT,1);
velY=(y-lastY)/dt*1000;lastY=y;
if(dy>8&&!isDrag)isDrag=true;
if(isDrag&&dy>0){
sheet.style.transition=‘none’;
sheet.style.transform=`translateX(-50%) translateY(${dy}px)`;
}
},{passive:true});

sheet.addEventListener(‘touchend’,e=>{
if(!active){active=false;return}
active=false;
if(!isDrag){isDrag=false;return}
isDrag=false;
const dy=e.changedTouches[0].clientY-startY;
const momentum=velY*0.12;
if(dy+momentum>110){
const remaining=window.innerHeight-e.changedTouches[0].clientY;
const dur=Math.max(160,Math.min(360,remaining/Math.max(Math.abs(velY),0.5)*1000));
sheet.style.transition=`transform ${dur}ms cubic-bezier(.4,0,1,1)`;
sheet.style.transform=`translateX(-50%) translateY(110%)`;
setTimeout(()=>{
const scrollY2=parseInt(document.body.style.top||‘0’)*-1;
document.body.classList.remove(‘modal-open’);
document.body.style.top=’’;
window.scrollTo(0,scrollY2);
document.getElementById(‘modal-bg’).classList.remove(‘open’);
document.getElementById(‘modal-sheet’).classList.remove(‘open’);
sheet.style.transform=’’;
},dur-20);
} else {
sheet.style.transition=‘transform .4s cubic-bezier(.34,1.3,.64,1)’;
sheet.style.transform=‘translateX(-50%) translateY(0)’;
}
},{passive:true});
}

// Reform bar on top if exists
if(d.reform>0&&sep){
  const rH=cH*(d.reform/maxV);
  const rGrad=ctx.createLinearGradient(0,pad.top+cH-mainH-rH,0,pad.top+cH-mainH);
  rGrad.addColorStop(0,'rgba(124,58,237,.9)');rGrad.addColorStop(1,'rgba(124,58,237,.65)');
  ctx.fillStyle=rGrad;
  roundRect(ctx,x-barW/2,pad.top+cH-mainH-rH,barW,rH,4);ctx.fill();
}

// Label
ctx.fillStyle=textColor;ctx.font=`10px Outfit,-apple-system,sans-serif`;ctx.textAlign='center';
ctx.fillText(labels[i],x,H-pad.bottom+14);

// Value above bar
if(d.main>0){
  ctx.font=`bold 9px Outfit,-apple-system,sans-serif`;
  ctx.fillStyle=isDark?'rgba(255,255,255,.7)':'rgba(0,0,0,.55)';

function roundRect(ctx,x,y,w,h,r){
if(h<=0)return;if(h<r)r=h;
ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h);
ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function hexAlpha(hex,a){
const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
return`rgba(${r},${g},${b},${a})`;
}
function fmtShort(n){
if(n>=1000)return(n/1000).toFixed(1).replace(’.’,’,’)+’ k’;
return Math.round(n)+’’;
}

function avatarColor(name){
const COLS=[’#2563eb’,’#16a34a’,’#ea580c’,’#7c3aed’,’#0891b2’,’#be185d’,’#b45309’,’#0d9488’];
let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))%COLS.length;
return COLS[Math.abs(h)%COLS.length];
}
function avatarInitials(first,last){
return((first?.[0]||’’)+(last?.[0]||’’)).toUpperCase()||’?’;

const norm=s=>s.normalize(‘NFD’).replace(/[\u0300-\u036f]/g,’’).toLowerCase();
const fullN=norm(cl.first+’ ‘+cl.last);
const firstN=norm(cl.first);
const lastN=norm(cl.last);
const qN=norm(q);
const phone=(cl.phone||’’).replace(/\D/g,’’);
const qPhone=q.replace(/\D/g,’’);
return fullN.includes(qN)||firstN.includes(qN)||lastN.includes(qN)||
(qPhone.length>0&&phone.includes(qPhone));
})
: […clients];

// Sort: alphabetically by last name then first
filtered.sort((a,b)=>(a.last+a.first).localeCompare(b.last+b.first,‘pl’));

if(!filtered.length){

filtered.forEach(cl=>{

html+=`<div class="cl-card" onclick="openClientForm(${cl.id})"> <div class="cl-card-top"> <div class="cl-avatar" style="background:${col}">${ini}</div> <div style="flex:1;min-width:0"> <div class="cl-name">${cl.first} ${cl.last}</div> ${ cl.phone ? `<div class='cl-phone'>📞 ${cl.phone}</div>` : '' } </div> <div style="color:var(--t3);font-size:18px">›</div> </div> ${tags.length?`<div class="cl-tags">${tags.join(’’)}</div>`:''} </div>`;

inner.style.transform=dir>0?‘translateY(0)’:‘translateY(-50%)’;

/* ══════════════════════════════════════
PULL TO REFRESH
══════════════════════════════════════ */
let ptrStartY=0,ptrActive=false,ptrTriggered=false;
function setupPullToRefresh(){
const statsTab=document.getElementById(‘tab-stats’);
const indicator=document.getElementById(‘ptr-indicator’);
const icon=document.getElementById(‘ptr-icon’);
const lbl=document.getElementById(‘ptr-lbl’);

document.addEventListener(‘touchstart’,e=>{
if(document.getElementById(‘tab-stats’).style.display===‘none’)return;
if(window.scrollY>0)return;
ptrStartY=e.touches[0].clientY;ptrActive=true;ptrTriggered=false;
},{passive:true});

document.addEventListener(‘touchmove’,e=>{
if(!ptrActive)return;
const dy=e.touches[0].clientY-ptrStartY;
if(dy>60&&!ptrTriggered){
indicator.classList.add(‘visible’);
icon.classList.add(‘ptr-spin’);
lbl.textContent=lang===‘ru’?‘Обновление…’:lang===‘pl’?‘Odświeżanie…’:‘Refreshing…’;
}
if(dy>60)ptrTriggered=true;
},{passive:true});

document.addEventListener(‘touchend’,()=>{
if(!ptrActive)return;ptrActive=false;
if(ptrTriggered){
setTimeout(()=>{
renderStats();
indicator.classList.remove(‘visible’);
icon.classList.remove(‘ptr-spin’);
ptrTriggered=false;
showToast(lang===‘ru’?‘✓ Обновлено’:lang===‘pl’?‘✓ Odświeżono’:‘✓ Refreshed’);
},600);
} else {
indicator.classList.remove(‘visible’);
}
},{passive:true});
}

const lid=e.locId;
byDay[d].byLoc[lid]=(byDay[d].byLoc[lid]||0)+e.total;
});
const maxV=Math.max(…Object.values(byDay).map(v=>v.total),1);
const CHART_H=76; // taller for stacked

    segsHtml=`<div style="width:18px;height:${totalH}px;display:flex;flex-direction:column;justify-content:flex-end;position:relative;border-radius:5px 5px 3px 3px;overflow:hidden;${todayMark?'box-shadow:0 0 0 2px var(--orange)':''}">${segsHtml}${amtLbl}</div>`;

  </div>`;
}

PARALLAX

function setupParallax(){
const sg=document.getElementById(‘stats-grid’);
if(!sg)return;
let ticking=false;
window.addEventListener(‘scroll’,()=>{
if(ticking)return;ticking=true;
requestAnimationFrame(()=>{
const scrollY=window.scrollY;
const cards=sg.querySelectorAll(’.sc’);
cards.forEach((card,i)=>{
const rect=card.getBoundingClientRect();
const center=window.innerHeight/2;
const dist=(rect.top+rect.height/2)-center;
const shift=dist*0.025*(i%2===0?1:-1);
card.style.transform=`translateY(${shift}px)`;
});
ticking=false;
});
},{passive:true});
}

function hexAlphaJS(hex,a){
try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}
catch{return’transparent’}
}
function getLocById(id){return locs.find(l=>l.id===id)}
function S(arr,k){return arr.reduce((s,e)=>s+(e[k]||0),0)}
function fmt(n){return Number(n||0).toLocaleString(‘pl-PL’,{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtH(n){return n%1===0?String(n):Number(n).toFixed(1)}
function fmtD(s){const[,m,d]=s.split(’-’);return d+’.’+m}
function fmtDFull(s){const[y,m,d]=s.split(’-’);return`${parseInt(d)} ${T.monthsFull[parseInt(m)-1]} ${y}`}
function emptyH(){return`<div style="text-align:center;padding:24px 20px;color:var(--t3);font-size:13.5px;font-weight:600">${T.noData}</div>`}
function showToast(msg){const t=document.getElementById(‘toast’);t.textContent=msg;t.classList.add(‘show’);setTimeout(()=>t.classList.remove(‘show’),2500)}
